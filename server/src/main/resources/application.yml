spring:
  application:
    name: server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/iprogressor}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
app:
  admin-bootstrap:
    zitadel-user-id: ${ADMIN_ZITADEL_USER_ID:dev-admin-zitadel-id}
    email: ${ADMIN_EMAIL:admin@iprogressor.local}
    full-name: ${ADMIN_FULL_NAME:System Administrator}
    department-name: ${ADMIN_DEPARTMENT_NAME:Administration}
  webhook:
    shared-secret: ${WEBHOOK_SHARED_SECRET:dev-webhook-shared-secret}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

---
spring:
  config:
    activate:
      on-profile: dev

app:
  dev:
    jwt-secret: ${DEV_JWT_SECRET:dev-only-signing-secret-change-me-32-bytes-minimum}
    jwt-issuer: iprogressor-dev

---
spring:
  config:
    activate:
      on-profile: prod
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${ZITADEL_ISSUER_URI}
